; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-cardputer]
platform = espressif32
; If your platform version exposes a direct Cardputer board ID, use it:
;   board = m5stack-cardputer
; Otherwise fall back to the compatible base board StampS3 (8 MB flash):
board = m5stack-stamps3
board_build.filesystem = littlefs

; The Cardputer has 8 MB flash. Set the size and a partition table that
; leaves room for the filesystem (LittleFS uses the spiffs partition).
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Cardputer @ ^1.1.1
    marian-craciunescu/ESP32Ping@^1.7
    ; SSH client (ewpa's libssh port for ESP32). Pin/adjust the version if the
    ; build can't resolve it: https://registry.platformio.org/libraries/ewpa/LibSSH-ESP32
    ewpa/LibSSH-ESP32

; Flags required for correct ESP32-S3 USB flashing
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
